# ─── Application ───────────────────────────────────────────
application.name=Airline Reservation System
application.modules.package=com.airline
application.languages=en
application.secret=CHANGE_ME_TO_A_RANDOM_SECRET_KEY

# ─── Session & Cookie ──────────────────────────────────────
application.cookie.prefix=airline
application.session.expire_time_in_seconds=3600
application.session.send_only_if_changed=true
application.session.transferred_over_https_only=false

# ─── Server ────────────────────────────────────────────────
ninja.port=8080

# ─── Database (JPA/Hibernate) ──────────────────────────────
db.connection.url=jdbc:postgresql://localhost:5432/YOUR_DB_NAME
db.connection.username=YOUR_DB_USERNAME
db.connection.password=YOUR_DB_PASSWORD

# JPA persistence unit name (must match your persistence.xml)
ninja.jpa.persistence_unit_name=airline_pu

# ─── Hibernate ─────────────────────────────────────────────
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
hibernate.show_sql=true
hibernate.hbm2ddl.auto=validate

# ─── Logging ───────────────────────────────────────────────
application.log.level=DEBUG
